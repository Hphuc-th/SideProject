name: pet-project
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GEMINI_KEY=
    volumes:
      - .:/app

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
